name: Import website source
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack:
    if: github.event.head_commit.message == 'Add source importer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack and commit source
        run: |
          base64 -d payload.b64 > /tmp/design-weekly.zip
          unzip -q -o /tmp/design-weekly.zip
          rm -f payload.b64 .github/workflows/unpack.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import design weekly source"
          git push
